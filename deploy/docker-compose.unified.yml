version: '3.2'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: vote-kit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: vote_kit_prod
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - vote-kit-network

  # 统一的 Redis 服务
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    networks:
      - vote-kit-network

  # Forge Engine
  forge-engine:
    build:
      context: ./forge
      dockerfile: Dockerfile.simple
    container_name: forge-engine
    environment:
      - FORGE_REDIS_ADDR=redis:6379
      - FORGE_REDIS_PASSWORD=redis123
      - FORGE_REDIS_DB=1
      - FORGE_KIRO_BINARY_PATH=/usr/local/bin/kiro-cli
      - FORGE_GIT_TOKEN=dummy-token
      - FORGE_WORKER_TASK_TIMEOUT=3600s
      - TZ=Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - forge_repos:/tmp/forge-repos
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
    networks:
      - vote-kit-network

  # Forge Export Server
  forge-export:
    build:
      context: ./forge
      dockerfile: Dockerfile.simple
    container_name: forge-export
    command: ["./export-server"]
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "8081:8081"
    volumes:
      - forge_repos:/tmp/forge-repos
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - forge-engine
    networks:
      - vote-kit-network

  # Vote-Kit Backend
  vote-kit-backend:
    build:
      context: ./vote-kit/backend
      dockerfile: Dockerfile
    container_name: vote-kit-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=vote_kit_prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis123
      - REDIS_DB=0
      - JWT_SECRET=your-production-jwt-secret
      - VOTE_KIT_BASE_URL=http://vote-kit-backend:3000
      - FORGE_REDIS_HOST=redis
      - FORGE_REDIS_PORT=6379
      - FORGE_REDIS_PASSWORD=redis123
      - FORGE_REDIS_DB=1
      - FORGE_EXPORT_SERVICE_URL=http://forge-export:8081
      - AI_GENERATION_TIMEOUT=300000
      - TZ=Asia/Shanghai
      - PROTOTYPE_WORKSPACE_DIR=/app/workspace
      - PROTOTYPE_SCREENSHOT_DIR=/app/uploads/prototypes
    ports:
      - "3000:3000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # 原型 HTML 与截图持久化（无此卷则容器重建后原型/截图丢失）
      - votekit-workspace:/app/workspace
      - votekit-uploads:/app/uploads
    depends_on:
      - mysql
      - redis
      - forge-engine
    networks:
      - vote-kit-network

  # Vote-Kit Frontend
  vote-kit-frontend:
    build:
      context: ./vote-kit/frontend
      dockerfile: Dockerfile
    container_name: vote-kit-frontend
    ports:
      - "80:80"
    depends_on:
      - vote-kit-backend
    networks:
      - vote-kit-network

volumes:
  mysql_data:
  forge_repos:
  votekit-workspace:
  votekit-uploads:

networks:
  vote-kit-network:
    driver: bridge
